[package]
name = "lash-oblique"
version = "0.1.0"
edition = "2024"
license = "MIT"

[[bin]]
name = "lash-oblique"
path = "src/main.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive", "env"] }
dotenvy = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
uuid = { version = "1", features = ["v4"] }

lash = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a", default-features = false, features = ["full"] }
lash-embed = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-export = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-llm-tools = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-mode-rlm = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-provider-codex = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-provider-google = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-provider-openai = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-providers-builtin = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-rlm-types = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-sqlite-store = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
lash-subagents = { git = "https://github.com/SamGalanakis/lash", rev = "ab6b6f31f98669ce495a1338182955d3902e629a" }
